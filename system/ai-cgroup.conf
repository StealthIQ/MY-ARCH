# /etc/systemd/system/ai-workload.slice
# Isolates AI inference from system memory pressure
# AI processes get raw RAM; other apps get compressed via zswap

[Unit]
Description=AI Workload Isolation Slice

[Slice]
# Reserve minimum 20GB for AI models (won't be swapped)
MemoryMin=20G
# Allow up to 28GB before pressure
MemoryHigh=28G
# Hard limit
MemoryMax=30G
# Disable zswap writeback for AI slice — keep model pages in RAM
# (set via: echo 0 > /sys/fs/cgroup/ai-workload.slice/memory.zswap.writeback)
