# /boot/loader/entries/leos.conf — systemd-boot entry for LEOS
# Install: copy to /boot/loader/entries/ and update ROOT_UUID

title   LEOS
linux   /vmlinuz-linux-leos
initrd  /initramfs-linux-leos.img
options root=UUID=ROOT_UUID rootflags=subvol=@ rw zswap.enabled=1 zswap.compressor=zstd zswap.zpool=zsmalloc zswap.max_pool_percent=50 zswap.shrinker_enabled=1
