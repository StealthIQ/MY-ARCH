# /etc/mkinitcpio.conf — LEOS bare-metal initramfs config
# Designed for real hardware with btrfs root + zswap

# Modules to load early (autodetect handles most hardware)
# Add GPU modules for early KMS (faster boot to display)
MODULES=(btrfs)

# Binaries to include
BINARIES=()

# Files to include
FILES=()

# Hooks (order matters!)
#   base        — essential init infrastructure
#   udev        — device manager (detects hardware dynamically)
#   autodetect  — only includes modules for THIS machine's hardware
#   modconf     — loads /etc/modprobe.d/ configs
#   kms         — early GPU modesetting (flicker-free boot)
#   keyboard    — keyboard drivers (needed to type in encrypt prompts etc)
#   block       — block device support (NVMe, SATA, USB storage)
#   filesystems — filesystem modules
#   fsck        — filesystem check on boot
HOOKS=(base udev autodetect modconf kms keyboard block filesystems fsck)

# Compression — use zstd for fast decompression
COMPRESSION="zstd"
COMPRESSION_OPTIONS=(-3)
