# /etc/sysctl.d/99-LEOS-memory.conf
# VM tuning for zswap + AI workloads

# Balanced reclaim: anonymous and file pages treated equally
# With zswap, swapping is cheap (compressed RAM), so allow it freely
vm.swappiness = 100

# No swap readahead — compressed pages have no locality
vm.page-cluster = 0

# Don't boost watermarks — let zswap shrinker handle pressure
vm.watermark_boost_factor = 0

# Fine-grained watermark scaling for smoother reclaim
vm.watermark_scale_factor = 125

# Writeback tuning — flush dirty pages earlier to avoid IO spikes
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5

# Keep inode/dentry caches longer (AI loads many model files)
vm.vfs_cache_pressure = 50

# Allow overcommit for AI model mmap loading
vm.overcommit_memory = 0
vm.overcommit_ratio = 80
