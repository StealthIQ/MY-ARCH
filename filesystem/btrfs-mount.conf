# /etc/fstab entries for LEOS btrfs layout
# All partitions use zstd:4 transparent compression

# Root filesystem
# UUID=<your-uuid>  /  btrfs  compress=zstd:4,ssd,noatime,space_cache=v2,subvol=/@  0 0

# Home
# UUID=<your-uuid>  /home  btrfs  compress=zstd:4,ssd,noatime,space_cache=v2,subvol=/@home  0 0

# AI Models (no compression — already quantized)
# UUID=<your-uuid>  /opt/models  btrfs  compress=no,ssd,noatime,space_cache=v2,subvol=/@models  0 0

# Media (no compression — already compressed)
# UUID=<your-uuid>  /home/leos/Media  btrfs  compress=no,ssd,noatime,space_cache=v2,subvol=/@media  0 0
