# /etc/fstab entries for LEOS btrfs layout
# All partitions use zstd:3 transparent compression

# Root filesystem
# UUID=<your-uuid>  /  btrfs  compress=zstd:3,ssd,noatime,space_cache=v2,subvol=@  0 0

# Home
# UUID=<your-uuid>  /home  btrfs  compress=zstd:3,ssd,noatime,space_cache=v2,subvol=@home  0 0

# AI Models (lower compression — models are already quantized)
# UUID=<your-uuid>  /opt/models  btrfs  compress=zstd:1,ssd,noatime,space_cache=v2,subvol=@models  0 0

# Mount options explained:
#   compress=zstd:3  — transparent compression, level 3 (near real-time)
#   ssd              — SSD-optimized allocation
#   noatime          — don't update access times (reduces writes)
#   space_cache=v2   — faster free space tracking
