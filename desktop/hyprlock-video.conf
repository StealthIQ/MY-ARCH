# Hyprlock - Video Background Mode
# Used by lock-video.sh — transparent background lets mpvpaper video show through

general {
    hide_cursor = true
    ignore_empty_input = false
    immediate_render = true
    text_trim = true
    fractional_scaling = 2
    fail_timeout = 2000
}

auth {
    pam:enabled = true
    pam:module = hyprlock
    fingerprint:enabled = false
}

animations {
    enabled = true
    bezier = fadeIn, 0.05, 0.9, 0.1, 1.05
    animation = fadeIn, 1, 5, fadeIn
}

background {
    monitor =
    color = rgba(0, 0, 0, 0)
    blur_passes = 0
    contrast = 1
    brightness = 1
}

input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(c4a7e7dd)
    inner_color = rgba(191724aa)
    font_color = rgba(e0def4ff)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Enter password...</i>
    hide_input = false
    rounding = 10
    check_color = rgba(9ccfd8ee)
    fail_color = rgba(eb6f92ee)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    capslock_color = rgba(f6c177ee)
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(e0def4ff)
    font_size = 120
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -300
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 5
    shadow_color = rgba(000000cc)
    shadow_boost = 1.5
}

label {
    monitor =
    text = cmd[update:1000] date +"%A, %d %B %Y"
    color = rgba(c4a7e7ff)
    font_size = 28
    font_family = JetBrainsMono Nerd Font
    position = 0, -150
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(000000cc)
}

label {
    monitor =
    text = Hi, $USER
    color = rgba(eb6f92ff)
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 0, 50
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(000000cc)
}

label {
    monitor =
    text = 
    color = rgba(c4a7e7ff)
    font_size = 48
    font_family = Font Awesome 6 Free Solid
    position = 0, 150
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(000000cc)
}

shape {
    monitor =
    size = 400, 2
    color = rgba(eb6f9280)
    position = 0, -200
    halign = center
    valign = center
    rotate = 0
}
