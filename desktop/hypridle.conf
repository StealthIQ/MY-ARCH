# Hypridle Configuration

general {
    lock_cmd = hyprlock
    unlock_cmd =
    before_sleep_cmd = hyprlock
    after_sleep_cmd =
}

listener {
    timeout = 600
    on-timeout = hyprlock
    on-resume =
}

listener {
    timeout = 540
    on-timeout = brightnessctl -s set 10
    on-resume = brightnessctl -r
}
